name: halaltune
description: "HalalTune — Premium Halal Audio Streaming"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Audio
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # State management
  provider: ^6.1.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # WebView for Google OAuth
  webview_flutter: ^4.8.0

  # UI helpers
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Storage / Downloads
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  http: ^1.2.2
  dio: ^5.7.0
  permission_handler: ^11.3.1

  # Background audio + lock screen controls
  audio_service: ^0.18.14

  # Misc
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Variable.ttf
