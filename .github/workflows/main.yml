name: Build Flutter APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Firebase files
        run: flutterfire configure --project=halaltune-6c908 --platforms=android --yes || true

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: halaltune-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload ARM64 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: halaltune-apk-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload ARMv7 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: halaltune-apk-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          if-no-files-found: error

      - name: Upload x86_64 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: halaltune-apk-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error
